<!DOCTYPE html>
<html>
    <head>
    <title>Naval Command</title>
    <link rel="stylesheet" href="index.css">
    </head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="anchor">
    <span>NAVAL COMMAND</span> 
  </div>
  <button id="exit-btn" onclick="showScreen('start')">Exit to Menu</button>
</header>

<section id="start" class="screen active">
  <div class="start-buttons">
    <button class="start-button" onclick="showScreen('setup')">Play Against Human</button>
    <button class="start-button" onclick="showScreen('setup')">Play Against Hunt / Target FSM</button>
    <button class="start-button" onclick="showScreen('setup')">Play Against Probability Density Map</button>
  </div>
</section>

<section id="setup" class="screen">
  <h1>SETUP</h1>

  <div class="setup-layout">
    <div class="setup-board">
      <div class="grid setup-grid"></div>
      <div class="ship-dock">
        <div class="ship-row">
          <span>Carrier</span>
          <div class="ship carrier"></div>
        </div>
        <div class="ship-row">
          <span>Battleship</span>
          <div class="ship battleship"></div>
        </div>
        <div class="ship-row">
          <span>Cruiser</span>
          <div class="ship cruiser"></div>
        </div>
        <div class="ship-row">
          <span>Submarine</span>
          <div class="ship submarine"></div>
        </div>
        <div class="ship-row">
          <span>Destroyer</span>
          <div class="ship destroyer"></div>
        </div>
      </div>
    </div>

    <div class="fleet-column">
      <div class="fleet-panel friendly">
        <h2>Friendly Fleet</h2>
        <div class="fleet-row"><span>Carrier</span><span class="fleet-health health-5"></span></div>
        <div class="fleet-row"><span>Battleship</span><span class="fleet-health health-4"></span></div>
        <div class="fleet-row"><span>Cruiser</span><span class="fleet-health health-3"></span></div>
        <div class="fleet-row"><span>Submarine</span><span class="fleet-health health-3"></span></div>
        <div class="fleet-row"><span>Destroyer</span><span class="fleet-health health-2"></span></div>
      </div>

      <div class="fleet-panel opposition">
        <h2>Opposition Fleet</h2>
        <div class="fleet-row"><span>Carrier</span><span class="fleet-health health-5"></span></div>
        <div class="fleet-row"><span>Battleship</span><span class="fleet-health health-4"></span></div>
        <div class="fleet-row"><span>Cruiser</span><span class="fleet-health health-3"></span></div>
        <div class="fleet-row"><span>Submarine</span><span class="fleet-health health-3"></span></div>
        <div class="fleet-row"><span>Destroyer</span><span class="fleet-health health-2"></span></div>
      </div>
    </div>

    <div class="grid setup-grid"></div>
  </div>

  <button class="ready-button" onclick="showScreen('play')">Ready</button>
</section>

<section id="play" class="screen">
  <div class="battle-layout">
    <div>
      <h1 class="red">FIRING</h1>
      <div class="grid"></div>
    </div>

    <div class="panel">
      <h1>ROUND 1</h1>
      <p>Friendly Fleet</p>
      <p>Opposition Fleet</p>
    </div>

    <div>
      <h1>DEFENDING</h1>
      <div class="grid"></div>
    </div>
  </div>
</section>

<script src="main.js"></script>
</body>
</html>
