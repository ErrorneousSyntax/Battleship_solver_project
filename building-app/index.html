<!DOCTYPE html>
<html>
    <head>
    <title>Naval Command</title>
    <link rel="stylesheet" href="index.css">
    </head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="anchor">
    <span>NAVAL COMMAND</span> 
  </div>
  <button id="exit-btn" onclick="showScreen('start')">Exit to Menu</button>
</header>

<section id="start" class="screen active">
  <div class="start-buttons">
    <button class="start-button" onclick="showScreen('setup')">Play Against Human</button>
    <button class="start-button" onclick="showScreen('setup')">Play Against Hunt / Target FSM</button>
    <button class="start-button" onclick="showScreen('setup')">Play Against Probability Density Map</button>
  </div>
</section>

<section id="setup" class="screen">
  <h1>SETUP</h1>

  <div class="setup-layout">
    <div class="setup-board">
      <div class="grid"></div>
      <div class="dock">Ships go here</div>
    </div>

    <div class="panel setup-panel">Fleet info</div>
  </div>

  <button class="ready-button" onclick="showScreen('play')">Ready</button>
</section>
e
<section id="play" class="screen">
  <div class="battle-layout">
    <div>
      <h1 class="red">FIRING</h1>
      <div class="grid"></div>
    </div>

    <div class="panel">
      <h1>ROUND 1</h1>
      <p>Friendly Fleet</p>
      <p>Opposition Fleet</p>
    </div>

    <div>
      <h1>DEFENDING</h1>
      <div class="grid"></div>
    </div>
  </div>
</section>

<script src="main.js"></script>
</body>
</html>
